<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIPPER FUTBOL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050508;
            --surface: #0d0d14;
            --surface2: #13131e;
            --border: rgba(255,255,255,0.06);
            --accent: #ff3a5c;
            --accent2: #ff7a00;
            --green: #00e5a0;
            --text: #ffffff;
            --muted: rgba(255,255,255,0.4);
            --glow: rgba(255, 58, 92, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            font-family: 'Rajdhani', sans-serif;
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            user-select: none;
        }

        /* ========================
           PANTALLA PRINCIPAL
        ======================== */
        #app {
            width: 100vw;
            height: 100vh;
            display: flex;
            position: relative;
        }

        /* ========================
           SIDEBAR
        ======================== */
        #sidebar {
            width: 420px;
            min-width: 420px;
            height: 100%;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 20;
            transform: translateX(0);
            transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
        }

        #sidebar.hidden {
            transform: translateX(-100%);
        }

        .sidebar-glow {
            position: absolute;
            top: 0; right: -1px;
            width: 1px;
            height: 100%;
            background: linear-gradient(to bottom, transparent, var(--accent), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }
        #sidebar.hidden .sidebar-glow { opacity: 1; }

        /* Logo / Header del sidebar */
        .sidebar-top {
            padding: 28px 28px 20px;
            border-bottom: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .sidebar-top::before {
            content: '';
            position: absolute;
            top: -40px; left: -40px;
            width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(255,58,92,0.12) 0%, transparent 70%);
            pointer-events: none;
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo span {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .sidebar-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 10px;
        }

        .live-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 8px var(--green);
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .sidebar-subtitle {
            font-size: 0.85rem;
            color: var(--muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .update-btn {
            margin-left: auto;
            background: rgba(255,58,92,0.1);
            border: 1px solid rgba(255,58,92,0.3);
            color: var(--accent);
            padding: 5px 12px;
            border-radius: 4px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .update-btn:hover { background: rgba(255,58,92,0.2); }

        /* Filtro de hora */
        .time-bar {
            display: flex;
            gap: 6px;
            padding: 14px 28px;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            scrollbar-width: none;
        }
        .time-bar::-webkit-scrollbar { display: none; }

        .time-pill {
            padding: 5px 14px;
            border-radius: 20px;
            background: var(--surface2);
            border: 1px solid var(--border);
            font-size: 0.8rem;
            color: var(--muted);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            letter-spacing: 1px;
        }

        .time-pill.active {
            background: rgba(255,58,92,0.15);
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Lista de eventos */
        .event-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.1) transparent;
        }

        .event-item {
            display: flex;
            align-items: stretch;
            padding: 0;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .event-item::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, rgba(255,58,92,0) 0%, rgba(255,58,92,0.05) 100%);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .event-item:hover::before,
        .event-item.selected::before { opacity: 1; }

        .event-item.selected {
            background: rgba(255,58,92,0.08);
        }

        .event-time-col {
            width: 70px;
            min-width: 70px;
            padding: 16px 0 16px 28px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
        }

        .event-hour {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.3rem;
            line-height: 1;
            color: var(--accent);
        }

        .event-live-badge {
            font-size: 0.6rem;
            letter-spacing: 1px;
            color: var(--green);
            margin-top: 2px;
        }

        .event-bar {
            width: 3px;
            margin: 10px 14px;
            border-radius: 2px;
            background: var(--border);
            transition: background 0.2s;
        }

        .event-item.selected .event-bar,
        .event-item:hover .event-bar {
            background: var(--accent);
        }

        .event-info {
            flex: 1;
            padding: 14px 28px 14px 0;
        }

        .event-teams {
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            line-height: 1.3;
            margin-bottom: 4px;
        }

        .event-league {
            font-size: 0.78rem;
            color: var(--muted);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .event-channels-count {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.7rem;
            color: var(--muted);
            letter-spacing: 1px;
        }

        /* Sidebar bottom status */
        .sidebar-footer {
            padding: 14px 28px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.78rem;
            color: var(--muted);
            letter-spacing: 1px;
        }

        .status-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--muted);
        }

        .status-dot.ok { background: var(--green); box-shadow: 0 0 5px var(--green); }
        .status-dot.err { background: var(--accent); box-shadow: 0 0 5px var(--accent); }

        /* ========================
           ÁREA DE REPRODUCCIÓN
        ======================== */
        #player-area {
            flex: 1;
            position: relative;
            background: #000;
            overflow: hidden;
        }

        #tv-iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: none;
            z-index: 1;
        }

        /* Pantalla de bienvenida */
        #welcome-screen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2;
            background: var(--bg);
        }

        .welcome-bg {
            position: absolute;
            inset: 0;
            overflow: hidden;
        }

        .welcome-bg::before {
            content: '';
            position: absolute;
            top: -200px; left: 50%;
            transform: translateX(-50%);
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(255,58,92,0.08) 0%, transparent 70%);
        }

        .grid-lines {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .welcome-content {
            position: relative;
            text-align: center;
        }

        .welcome-logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 5rem;
            letter-spacing: 8px;
            background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 12px;
        }

        .welcome-sub {
            font-size: 0.9rem;
            letter-spacing: 5px;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 48px;
        }

        .welcome-hint {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .key-hint {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
            letter-spacing: 1px;
        }

        .key-box {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 4px;
            padding: 4px 10px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1rem;
            color: white;
            letter-spacing: 2px;
        }

        /* Header superpuesto sobre el player */
        #player-header {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 20px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
            z-index: 10;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .now-playing {
            display: flex;
            flex-direction: column;
        }

        .np-channel {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 3px;
            color: white;
            line-height: 1;
        }

        .np-event {
            font-size: 0.82rem;
            color: rgba(255,255,255,0.6);
            letter-spacing: 1px;
            margin-top: 3px;
        }

        .player-clock {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.7);
        }

        /* Overlay "cargando" mientras el iframe carga */
        #loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
            z-index: 8;
        }

        #loading-overlay.active { display: flex; }

        .loader-ring {
            width: 60px; height: 60px;
            border: 3px solid rgba(255,58,92,0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loader-text {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 4px;
            color: var(--muted);
        }

        /* ========================
           MODAL CANALES
        ======================== */
        #modal-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.75);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 50;
            backdrop-filter: blur(4px);
        }

        #modal-overlay.active { display: flex; }

        .modal-box {
            background: var(--surface);
            border: 1px solid rgba(255,58,92,0.3);
            border-radius: 12px;
            padding: 0;
            min-width: 340px;
            max-width: 420px;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,58,92,0.1);
        }

        .modal-title-bar {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            background: rgba(255,58,92,0.05);
        }

        .modal-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            letter-spacing: 3px;
            color: var(--accent);
        }

        .modal-event-name {
            font-size: 0.85rem;
            color: var(--muted);
            margin-top: 4px;
            letter-spacing: 1px;
        }

        .modal-channels {
            padding: 12px;
        }

        .channel-btn {
            width: 100%;
            padding: 14px 16px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all 0.2s;
        }

        .channel-btn:last-child { margin-bottom: 0; }

        .channel-btn.selected,
        .channel-btn:hover {
            background: rgba(255,58,92,0.1);
            border-color: rgba(255,58,92,0.5);
        }

        .ch-icon {
            width: 36px; height: 36px;
            border-radius: 6px;
            background: rgba(255,58,92,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .ch-name {
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.5px;
            color: var(--text);
        }

        .ch-quality {
            margin-left: auto;
            font-size: 0.7rem;
            letter-spacing: 1px;
            color: var(--green);
            background: rgba(0,229,160,0.1);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .modal-hint {
            padding: 12px 24px;
            border-top: 1px solid var(--border);
            font-size: 0.75rem;
            color: var(--muted);
            letter-spacing: 1px;
            text-align: center;
        }

        /* ========================
           NOTIFICACIONES TOAST
        ======================== */
        #toast {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: rgba(13,13,20,0.95);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 0.88rem;
            letter-spacing: 1px;
            color: var(--muted);
            z-index: 100;
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
            white-space: nowrap;
        }

        #toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Sidebar toggle button (visible cuando el sidebar está oculto) */
        #sidebar-toggle {
            position: absolute;
            left: 0; top: 50%;
            transform: translateY(-50%);
            width: 24px;
            height: 60px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            border-radius: 0 6px 6px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 25;
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        #sidebar-toggle.visible {
            opacity: 1;
            pointer-events: auto;
        }

        #sidebar-toggle::after {
            content: '›';
            font-size: 1.2rem;
            color: var(--accent);
        }

        /* Empty state */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: var(--muted);
            letter-spacing: 2px;
            font-size: 0.85rem;
            gap: 12px;
        }

        .empty-icon {
            font-size: 2rem;
            opacity: 0.3;
        }
    </style>
</head>
<body>

<div id="app">

    <!-- SIDEBAR -->
    <div id="sidebar">
        <div class="sidebar-glow"></div>

        <div class="sidebar-top">
            <div class="logo">SPORT<span>STREAM</span></div>
            <div class="sidebar-meta">
                <div class="live-dot"></div>
                <div class="sidebar-subtitle">Eventos en vivo</div>
                <button class="update-btn" id="update-btn" onclick="tryUpdate()">↻ ACTUALIZAR</button>
            </div>
        </div>

        <div class="event-list" id="event-list">
            <div class="empty-state">
                <div class="empty-icon">⏳</div>
                <span>CARGANDO EVENTOS...</span>
            </div>
        </div>

        <div class="sidebar-footer">
            <div class="status-dot" id="status-dot"></div>
            <span id="status-text">Conectando...</span>
            <span style="margin-left: auto;" id="current-time">00:00</span>
        </div>
    </div>

    <!-- ÁREA DEL PLAYER -->
    <div id="player-area">
        <!-- Pantalla de bienvenida -->
        <div id="welcome-screen">
            <div class="welcome-bg">
                <div class="grid-lines"></div>
            </div>
            <div class="welcome-content">
                <div class="welcome-logo">SPORTSTREAM</div>
                <div class="welcome-sub">Tu señal deportiva en vivo</div>
                <div class="welcome-hint">
                    <div class="key-hint">
                        <span class="key-box">◀ ▲ ▼</span>
                        <span>Navegar eventos</span>
                    </div>
                    <div class="key-hint">
                        <span class="key-box">OK</span>
                        <span>Seleccionar / Reproducir</span>
                    </div>
                    <div class="key-hint">
                        <span class="key-box">BACK</span>
                        <span>Volver al menú</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- IFRAME OCULTO - se muestra cuando hay canal activo -->
        <iframe id="tv-iframe"
                allow="autoplay; encrypted-media; fullscreen; picture-in-picture; accelerometer; gyroscope"
                allowfullscreen
                sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation allow-presentation"
        ></iframe>

        <!-- Overlay loading -->
        <div id="loading-overlay">
            <div class="loader-ring"></div>
            <div class="loader-text">CARGANDO SEÑAL...</div>
        </div>

        <!-- Header del player (info del canal activo) -->
        <div id="player-header" style="opacity:0">
            <div class="now-playing">
                <div class="np-channel" id="np-channel">—</div>
                <div class="np-event" id="np-event">—</div>
            </div>
            <div class="player-clock" id="player-clock">00:00</div>
        </div>

        <!-- Sidebar toggle -->
        <div id="sidebar-toggle" onclick="showMenu()"></div>
    </div>

</div>

<!-- MODAL CANALES -->
<div id="modal-overlay">
    <div class="modal-box">
        <div class="modal-title-bar">
            <div class="modal-title">SELECCIONAR CANAL</div>
            <div class="modal-event-name" id="modal-event-name">—</div>
        </div>
        <div class="modal-channels" id="modal-channels"></div>
        <div class="modal-hint">▲ ▼ Navegar &nbsp;·&nbsp; OK Reproducir &nbsp;·&nbsp; BACK Cancelar</div>
    </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
    // =============================================
    // ESTADO
    // =============================================
    let events = [];
    let currentIndex = 0;
    let isMenuOpen = true;
    let isModalOpen = false;
    let modalIndex = 0;
    let activeEvent = null;
    let activeChannel = null;
    let backPressCount = 0;
    let backTimeout = null;

    // =============================================
    // INIT
    // =============================================
    function init() {
        updateClock();
        setInterval(updateClock, 1000);
        document.addEventListener('keydown', onKey);
        tryUpdate();
    }

    // =============================================
    // RELOJ
    // =============================================
    function updateClock() {
        const t = new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('current-time').textContent = t;
        document.getElementById('player-clock').textContent = t;
    }

    // =============================================
    // TECLADO
    // =============================================
    function onKey(e) {
        const prevent = ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Escape','Backspace','Enter'];
        if (prevent.includes(e.key)) e.preventDefault();

        if (isModalOpen) {
            switch(e.key) {
                case 'ArrowUp': modalNav(-1); break;
                case 'ArrowDown': modalNav(1); break;
                case 'Enter': confirmModal(); break;
                case 'Escape': case 'Backspace': closeModal(); break;
            }
            return;
        }

        switch(e.key) {
            case 'ArrowUp': navigate(-1); break;
            case 'ArrowDown': navigate(1); break;
            case 'ArrowLeft':
                if (!isMenuOpen) showMenu();
                break;
            case 'ArrowRight':
                if (isMenuOpen) hideMenu();
                break;
            case 'Enter':
                if (isMenuOpen) selectEvent();
                else if (activeChannel) showMenu();
                break;
            case 'Escape':
            case 'Backspace':
                handleBack();
                break;
        }
    }

    function handleBack() {
        if (isMenuOpen) {
            if (activeChannel) { hideMenu(); return; }
            // si no hay canal activo, doble back para salir
            if (backPressCount === 0) {
                backPressCount = 1;
                showToast('Presiona BACK nuevamente para salir');
                backTimeout = setTimeout(() => { backPressCount = 0; }, 3000);
            } else {
                clearTimeout(backTimeout);
                window.close();
                // Para Android TV WebView:
                if (window.Android) window.Android.exit();
            }
        } else {
            showMenu();
        }
    }

    // =============================================
    // NAVEGACIÓN EVENTOS
    // =============================================
    function navigate(dir) {
        if (!isMenuOpen) { showMenu(); return; }
        if (events.length === 0) return;
        currentIndex = Math.max(0, Math.min(events.length - 1, currentIndex + dir));
        renderSelection();
        document.querySelector('.event-item.selected')?.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }

    function renderSelection() {
        document.querySelectorAll('.event-item').forEach((el, i) => {
            el.classList.toggle('selected', i === currentIndex);
        });
    }

    function selectEvent() {
        const ev = events[currentIndex];
        if (!ev || !ev.channels?.length) return;
        if (ev.channels.length === 1) {
            playChannel(ev.channels[0], ev);
        } else {
            openModal(ev);
        }
    }

    // =============================================
    // REPRODUCCIÓN — SOLUCIÓN AUTOPLAY SIN CLICK
    // =============================================
    function playChannel(channel, ev) {
        activeChannel = channel;
        activeEvent = ev || activeEvent;

        // Ocultar bienvenida
        document.getElementById('welcome-screen').style.display = 'none';

        // Mostrar loading
        const loadingEl = document.getElementById('loading-overlay');
        loadingEl.classList.add('active');

        // Actualizar header info
        document.getElementById('np-channel').textContent = channel.name;
        document.getElementById('np-event').textContent = activeEvent?.teams || '';

        const iframe = document.getElementById('tv-iframe');

        // *** SOLUCIÓN AL PROBLEMA DE AUTOPLAY ***
        // En lugar de cargar la URL directamente (que requiere click del usuario),
        // construimos una página HTML que se auto-ejecuta dentro del iframe
        // y hace click/touch automático al cargar.

        let url = channel.url;
        // Asegurar parámetros de autoplay en la URL
        if (!url.includes('autoplay')) {
            url += (url.includes('?') ? '&' : '?') + 'autoplay=1&mute=0';
        }

        // Técnica: usar srcdoc para inyectar un documento que:
        // 1. Carga la URL en su propio iframe interno
        // 2. Simula clicks/touches automáticamente en varios puntos
        // 3. Usa múltiples estrategias según el tipo de player

        const autoplayDoc = `<!DOCTYPE html>
<html>
<head>
<style>
  * { margin:0;padding:0;box-sizing:border-box; }
  body { background:#000; overflow:hidden; width:100vw; height:100vh; }
  iframe { width:100%;height:100%;border:none; display:block; }
</style>
</head>
<body>
<iframe id="inner" src="${url}"
  allow="autoplay; encrypted-media; fullscreen; picture-in-picture; accelerometer; gyroscope"
  allowfullscreen
></iframe>
<script>
(function() {
  var iframe = document.getElementById('inner');
  var clickCount = 0;
  var maxAttempts = 12;

  // Función principal: simula interacción humana en el iframe
  function simulateInteraction() {
    if (clickCount >= maxAttempts) return;
    clickCount++;

    var rect = iframe.getBoundingClientRect();
    var cx = rect.width / 2;
    var cy = rect.height / 2;

    // Puntos estratégicos donde suelen estar los botones de play
    var points = [
      [cx, cy],            // centro exacto
      [cx, cy - 20],       // un poco arriba del centro
      [cx - 30, cy],       // izquierda del centro
      [cx + 30, cy],       // derecha del centro
    ];

    points.forEach(function(pt) {
      // Mouse click
      ['mousedown','mouseup','click'].forEach(function(evType) {
        var ev = new MouseEvent(evType, {
          bubbles: true, cancelable: true,
          clientX: pt[0], clientY: pt[1],
          button: 0, buttons: 1
        });
        document.elementFromPoint(pt[0], pt[1])?.dispatchEvent(ev);
        document.body.dispatchEvent(ev);
        iframe.dispatchEvent(ev);
      });

      // Touch event
      try {
        var touch = new Touch({
          identifier: Date.now() + Math.random(),
          target: document.body,
          clientX: pt[0], clientY: pt[1],
          radiusX: 5, radiusY: 5, force: 1, rotationAngle: 0
        });
        ['touchstart','touchend'].forEach(function(evType) {
          var te = new TouchEvent(evType, {
            bubbles: true, cancelable: true,
            touches: evType === 'touchstart' ? [touch] : [],
            changedTouches: [touch]
          });
          document.body.dispatchEvent(te);
          iframe.dispatchEvent(te);
        });
      } catch(e) {}
    });

    // Intentar directamente en el contenido del iframe si same-origin
    try {
      var iDoc = iframe.contentDocument || iframe.contentWindow.document;
      var playBtns = iDoc.querySelectorAll(
        'button, [class*="play"], [class*="Play"], [id*="play"], [id*="Play"], ' +
        '[class*="btn"], video, [class*="overlay"], [class*="cover"]'
      );
      playBtns.forEach(function(btn) { try { btn.click(); } catch(e) {} });

      var videos = iDoc.querySelectorAll('video');
      videos.forEach(function(v) {
        v.muted = false;
        v.autoplay = true;
        v.play().catch(function() { v.muted = true; v.play(); });
      });
    } catch(e) {
      // Cross-origin: normal, no hacemos nada
    }
  }

  // Disparar en cascada con retardos crecientes
  var delays = [300, 800, 1500, 2500, 4000, 6000];
  delays.forEach(function(d) {
    setTimeout(simulateInteraction, d);
  });

  // También al cargar el iframe
  iframe.addEventListener('load', function() {
    setTimeout(simulateInteraction, 200);
    setTimeout(simulateInteraction, 600);
    setTimeout(simulateInteraction, 1200);
  });
})();
<\/script>
</body>
</html>`;

        // Usar srcdoc para máxima compatibilidad
        iframe.style.display = 'block';
        iframe.srcdoc = autoplayDoc;

        // Ocultar loading después de un tiempo razonable
        setTimeout(() => {
            loadingEl.classList.remove('active');
            const header = document.getElementById('player-header');
            header.style.opacity = '1';
            // Ocultar header después de unos segundos
            setTimeout(() => { header.style.opacity = '0'; }, 4000);
        }, 2500);

        hideMenu();
    }

    // =============================================
    // MENU SHOW/HIDE
    // =============================================
    function showMenu() {
        isMenuOpen = true;
        document.getElementById('sidebar').classList.remove('hidden');
        document.getElementById('sidebar-toggle').classList.remove('visible');
        renderSelection();
    }

    function hideMenu() {
        isMenuOpen = false;
        document.getElementById('sidebar').classList.add('hidden');
        if (activeChannel) {
            document.getElementById('sidebar-toggle').classList.add('visible');
        }
    }

    // =============================================
    // MODAL CANALES
    // =============================================
    function openModal(ev) {
        isModalOpen = true;
        modalIndex = 0;
        activeEvent = ev;

        document.getElementById('modal-event-name').textContent = ev.teams;

        const container = document.getElementById('modal-channels');
        container.innerHTML = '';

        const icons = ['📺','🎬','📡','🖥️','📻'];

        ev.channels.forEach((ch, i) => {
            const btn = document.createElement('div');
            btn.className = 'channel-btn' + (i === 0 ? ' selected' : '');
            btn.innerHTML = `
                <div class="ch-icon">${icons[i % icons.length]}</div>
                <div class="ch-name">${ch.name}</div>
                <div class="ch-quality">HD</div>
            `;
            btn.onclick = () => { modalIndex = i; confirmModal(); };
            container.appendChild(btn);
        });

        document.getElementById('modal-overlay').classList.add('active');
    }

    function modalNav(dir) {
        const btns = document.querySelectorAll('.channel-btn');
        modalIndex = Math.max(0, Math.min(btns.length - 1, modalIndex + dir));
        btns.forEach((b, i) => b.classList.toggle('selected', i === modalIndex));
    }

    function confirmModal() {
        const ch = activeEvent.channels[modalIndex];
        closeModal();
        playChannel(ch, activeEvent);
    }

    function closeModal() {
        isModalOpen = false;
        document.getElementById('modal-overlay').classList.remove('active');
    }

    // =============================================
    // TOAST
    // =============================================
    function showToast(msg, duration = 3000) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), duration);
    }

    // =============================================
    // ACTUALIZAR EVENTOS
    // =============================================
    async function tryUpdate() {
        const btn = document.getElementById('update-btn');
        const dot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');

        btn.textContent = '↻ ACTUALIZANDO';
        statusText.textContent = 'Actualizando...';
        dot.className = 'status-dot';

        const GIST_URL = 'https://gist.githubusercontent.com/RenzoCL/7f56fdb7784efa4aa8e135f0968a0dc1/raw/eventos.json';

        try {
            const res = await fetch(GIST_URL + '?t=' + Date.now());
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const data = await res.json();

            if (data && data.length > 0) {
                events = data.sort((a, b) => a.time.localeCompare(b.time));
                renderEvents();
                dot.className = 'status-dot ok';
                statusText.textContent = `${events.length} eventos`;
                showToast(`✓ ${events.length} eventos cargados`);
            } else {
                events = [];
                renderEvents();
                dot.className = 'status-dot';
                statusText.textContent = 'Sin eventos';
            }
        } catch (e) {
            console.error(e);
            dot.className = 'status-dot err';
            statusText.textContent = 'Sin conexión';
            showToast('⚠ Sin conexión a internet');
            // Datos de respaldo
            events = [
                { time: "12:00", teams: "Partido de Prueba", league: "Modo Offline", channels: [{ name: "Canal Demo", url: "about:blank" }] }
            ];
            renderEvents();
        }

        btn.textContent = '↻ ACTUALIZAR';
    }

    // =============================================
    // RENDER LISTA DE EVENTOS
    // =============================================
    function renderEvents() {
        const container = document.getElementById('event-list');

        if (events.length === 0) {
            container.innerHTML = `<div class="empty-state"><div class="empty-icon">📅</div><span>SIN EVENTOS HOY</span></div>`;
            return;
        }

        container.innerHTML = '';
        events.forEach((ev, i) => {
            const div = document.createElement('div');
            div.className = 'event-item' + (i === currentIndex ? ' selected' : '');

            const chCount = ev.channels?.length || 0;

            div.innerHTML = `
                <div class="event-time-col">
                    <div class="event-hour">${ev.time}</div>
                    <div class="event-live-badge">● EN VIVO</div>
                </div>
                <div class="event-bar"></div>
                <div class="event-info">
                    <div class="event-teams">${ev.teams}</div>
                    <div class="event-league">${ev.league}</div>
                </div>
                ${chCount > 1 ? `<div class="event-channels-count">${chCount} canales</div>` : ''}
            `;

            div.onclick = () => {
                currentIndex = i;
                renderSelection();
                selectEvent();
            };

            container.appendChild(div);
        });
    }

    // =============================================
    // ARRANCAR
    // =============================================
    init();
</script>
</body>
</html>
