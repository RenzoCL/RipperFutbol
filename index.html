<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Sports - Simulador TV</title>
    <style>
        :root {
            --tv-bg: #1a1a2e; --sidebar-bg: rgba(0, 0, 0, 0.95);
            --highlight: #e94560; --text-color: #ffffff;
            --active-green: #4ecca3;
        }

        body {
            margin: 0; padding: 0; background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-color); overflow: hidden; height: 100vh;
            user-select: none;
        }

        #tv-container {
            width: 100vw; height: 100vh; background-color: #000;
            position: relative; overflow: hidden;
            display: none; 
        }

        /* Pantalla de Apagado */
        #off-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            color: #333; font-size: 1.2rem; flex-direction: column;
        }
        #off-screen.active { display: flex; }
        #off-screen.hidden { display: none; }

        /* Video */
        .player-area { width: 100%; height: 100%; position: relative; z-index: 1; background: #000; }
        .tv-screen { width: 100%; height: 100%; border: none; background: #000; }

        /* Overlay de "Presione OK" */
        .play-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5; display: none; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.7); cursor: pointer;
        }
        .play-overlay.active { display: flex; }
        
        .play-hint { text-align: center; animation: pulse 2s infinite; }
        .play-hint-icon { font-size: 6rem; color: var(--highlight); margin-bottom: 10px; text-shadow: 0 0 20px var(--highlight); }
        .play-hint-text { font-size: 1.8rem; color: white; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        /* Overlay de Advertencia (Salir) */
        .exit-overlay {
            /* Subtle bottom toast instead of full-screen modal */
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            z-index: 60;
            display: none;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }
        .exit-overlay.active { display: flex; }
        .exit-box {
            background: rgba(30,30,30,0.7);
            padding: 8px 14px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 6px 18px rgba(0,0,0,0.6);
            pointer-events: auto;
            font-size: 0.95rem;
            color: #eee;
        }
        .exit-box h2 { margin: 0; font-size: 0.95rem; color: #f1f1f1; }
        .exit-box p { margin: 0; color: #ccc; font-size: 0.85rem; }

        /* Volumen Overlay */
        .volume-overlay {
            position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85); padding: 15px 30px; border-radius: 10px;
            display: none; align-items: center; gap: 15px; z-index: 50; border: 1px solid #444;
        }
        .volume-overlay.active { display: flex; }
        .vol-bar-container { width: 300px; height: 8px; background: #333; border-radius: 4px; overflow: hidden; }
        .vol-bar-level { height: 100%; background: var(--highlight); width: 50%; transition: width 0.1s; }

        /* Header */
        .tv-header {
            position: absolute; top: 0; left: 0; right: 0; padding: 20px 40px;
            display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); z-index: 10; pointer-events: none;
        }
        .channel-brand { font-size: 1.5rem; font-weight: bold; color: var(--active-green); }
        .time { font-size: 1.2rem; color: #ccc; }

        /* Menú Lateral */
        .sidebar-menu {
            position: absolute; top: 0; left: -450px; width: 450px; height: 100%;
            background: var(--sidebar-bg); z-index: 20; transition: left 0.3s ease;
            display: flex; flex-direction: column; border-right: 2px solid #333;
        }
        .sidebar-menu.open { left: 0; }
        .sidebar-header { padding: 20px; background: rgba(233, 69, 96, 0.1); border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center;}
        .sidebar-header h3 { margin: 0; color: var(--highlight); text-transform: uppercase; font-size: 1rem; }
        .status-badge { font-size: 0.7rem; background: #444; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
        
        .event-list { flex: 1; overflow-y: auto; padding: 10px 0; }
        
        .event-item { padding: 15px 20px; border-bottom: 1px solid #2a2a2a; cursor: pointer; }
        .event-item.selected { background: rgba(233, 69, 96, 0.2); border-left: 4px solid var(--highlight); }
        .event-time { color: var(--active-green); font-weight: bold; font-size: 0.9rem; }
        .event-name { font-size: 1.1rem; margin: 5px 0; }
        .event-league { color: #888; font-size: 0.8rem; }

        .remote-control { display: none; }

        /* Modal Canales */
        .channel-modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #222; padding: 30px; border-radius: 10px; border: 2px solid var(--highlight);
            display: none; z-index: 30; min-width: 300px; box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        .channel-option { padding: 15px; margin: 5px 0; background: #333; cursor: pointer; border-radius: 5px; border: 1px solid transparent; }
        .channel-option.selected { border-color: var(--highlight); background: rgba(233, 69, 96, 0.2); }
    </style>
</head>
<body>

    <!-- Pantalla Negra -->
    <div id="off-screen" class="active">
        <div style="text-align:center">
            <div style="font-size: 3rem; margin-bottom: 20px;">⏻</div>
            <p>APLICACIÓN CERRADA</p>
            <p style="font-size: 0.8rem; color: #555;">Presione cualquier tecla para encender</p>
            <div style="margin-top: 20px; font-size: 0.7rem; color: #444;">
                <p>ESC = BACK | BACKSPACE = HOME</p>
            </div>
        </div>
    </div>

    <div id="tv-container">
        <div class="player-area">
            <iframe id="tv-screen" class="tv-screen" style="display:none;" allow="autoplay; encrypted-media; fullscreen; picture-in-picture" allowfullscreen></iframe>
            
            <div class="play-overlay" id="play-overlay" onclick="triggerPlay()">
                <div class="play-hint">
                    <div class="play-hint-icon">▶</div>
                    <div class="play-hint-text">PRESIONE OK PARA REPRODUCIR</div>
                </div>
            </div>
        </div>

        <!-- OVERLAY DE ADVERTENCIA (NUEVO) -->
        <div class="exit-overlay" id="exit-overlay">
            <div class="exit-box">
                <div>Presione <strong>ESC</strong> nuevamente para salir</div>
            </div>
        </div>

        <div class="volume-overlay" id="vol-overlay">
            <div>🔊</div>
            <div class="vol-bar-container"><div class="vol-bar-level" id="vol-level"></div></div>
            <div class="vol-text" id="vol-text">50%</div>
        </div>

        <div class="tv-header">
            <div class="channel-brand" id="channel-name">LIVE TV</div>
            <div class="time" id="current-time">00:00</div>
        </div>

        <div class="sidebar-menu" id="sidebar">
            <div class="sidebar-header">
                <h3>Agenda Deportiva</h3>
                <span class="status-badge" id="status-badge" onclick="tryUpdate()">LOCAL</span>
            </div>
            <div class="event-list" id="event-list"></div>
        </div>

        <div class="channel-modal" id="channel-modal">
            <h3 style="margin-top:0; color: var(--highlight);">Elige Canal</h3>
            <div id="channel-options"></div>
            <p style="font-size: 0.8rem; color: #aaa;">↑↓ Navegar | OK Seleccionar</p>
        </div>
    </div>

    <script>
        // --- VARIABLES GLOBALES ---
        let isAppRunning = false;
        let isMenuOpen = false;
        let currentList = [];
        let currentIndex = 0;
        let isModalOpen = false;
        let currentModalIndex = 0;
        let volume = 50;
        let volHideTimeout = null;
        let isWaitingForPlay = false;
        
        // Variables para el control de salida
        let isWaitingForExitConfirm = false;
        let exitTimeout = null;

        // --- INICIO ---
        function init() {
            updateClock();
            setInterval(updateClock, 1000);
            currentList = [{ time: "--:--", teams: "Cargando...", league: "Actualizando", channels: [{name:"Wait", url:"#"}] }];
            renderAgenda();
            tryUpdate();
            setupKeyListener();
            
            // Intentar recuperar foco constantemente si estamos en video
            setInterval(() => {
                if (isAppRunning && !isMenuOpen && !isModalOpen && !isWaitingForPlay) {
                     // Recupera foco solo si no hay overlays activos
                     if(!document.getElementById('exit-overlay').classList.contains('active')) {
                        window.focus();
                     }
                }
            }, 500);
        }

        // --- DETECTOR DE TECLAS ---
        function setupKeyListener() {
            document.addEventListener('keydown', function(e) {
                
                // 1. ENCENDIDO
                if (!isAppRunning) {
                    powerOn();
                    return; 
                }

                // 2. TECLAS ESPECIALES
                
                // BACKSPACE = HOME (Siempre apaga)
                if (e.key === 'Backspace') {
                    e.preventDefault();
                    handleRemote('home');
                    return;
                }

                // ESC = BACK (Lógica compleja)
                if (e.key === 'Escape') {
                    e.preventDefault();
                    handleRemote('back');
                    return;
                }

                // 3. NAVEGACIÓN
                if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].indexOf(e.key) > -1) {
                    e.preventDefault();
                }
                
                switch(e.key) {
                    case 'ArrowUp': handleRemote('up'); break;
                    case 'ArrowDown': handleRemote('down'); break;
                    case 'ArrowLeft': handleRemote('left'); break;
                    case 'ArrowRight': handleRemote('right'); break;
                    case 'Enter': handleRemote('ok'); break;
                }
            });
        }

        // --- LÓGICA DE ENCENDIDO / APAGADO ---
        function powerOn() {
            isAppRunning = true;
            document.getElementById('off-screen').classList.remove('active');
            document.getElementById('off-screen').classList.add('hidden');
            document.getElementById('tv-container').style.display = 'block';
            toggleMenu(true);
        }

        function powerOff() {
            isAppRunning = false;
            isMenuOpen = false;
            isModalOpen = false;
            isWaitingForPlay = false;
            isWaitingForExitConfirm = false; // Resetear estado de salida
            
            document.getElementById('tv-container').style.display = 'none';
            document.getElementById('off-screen').classList.add('active');
            document.getElementById('off-screen').classList.remove('hidden');
            document.getElementById('exit-overlay').classList.remove('active'); // Ocultar aviso
            
            document.getElementById('tv-screen').src = 'about:blank';
        }

        // --- ACTUALIZACIÓN ---
        async function tryUpdate() {
            const badge = document.getElementById('status-badge');
            badge.innerText = "ACTUALIZANDO...";
            const timeoutId = setTimeout(() => badge.innerText = "LOCAL", 5000);
            const GIST_RAW_URL = 'https://gist.githubusercontent.com/RenzoCL/7f56fdb7784efa4aa8e135f0968a0dc1/raw/eventos.json';

            try {
                const response = await fetch(GIST_RAW_URL);
                const data = await response.json();
                clearTimeout(timeoutId);
                if (data && data.length > 0) {
                    currentList = data;
                    currentList.sort((a, b) => a.time.localeCompare(b.time));
                    renderAgenda();
                    badge.innerText = "EN VIVO";
                    badge.style.color = "#4ecca3";
                }
            } catch (e) {
                clearTimeout(timeoutId);
                badge.innerText = "ERROR RED";
            }
        }

        // --- NAVEGACIÓN PRINCIPAL (LÓGICA MODIFICADA) ---
        function handleRemote(action) {
            
            // 1. Estamos viendo video y hay overlay de "Play"?
            if (isWaitingForPlay) {
                if (action === 'ok') triggerPlay();
                else if (action === 'back' || action === 'home') {
                    isWaitingForPlay = false;
                    document.getElementById('play-overlay').classList.remove('active');
                    toggleMenu(true);
                }
                return;
            }

            // 2. Hay un modal abierto?
            if (isModalOpen) {
                handleModalNav(action);
                return;
            }

            // 3. Navegación normal
            switch(action) {
                case 'home':
                    // HOME siempre apaga
                    powerOff();
                    break;

                case 'back':
                    if (isMenuOpen) {
                        // Si menú abierto -> Cerrar menú
                        toggleMenu(false);
                    } else {
                        // Si menú cerrado -> Lógica de doble confirmación
                        
                        if (isWaitingForExitConfirm) {
                            // Segunda vez que presiona -> APAGAR
                            powerOff();
                        } else {
                            // Primera vez que presiona -> MOSTRAR AVISO
                            isWaitingForExitConfirm = true;
                            document.getElementById('exit-overlay').classList.add('active');
                            
                            // Si espera 3 segundos sin presionar, ocultar aviso
                            clearTimeout(exitTimeout);
                            exitTimeout = setTimeout(() => {
                                isWaitingForExitConfirm = false;
                                document.getElementById('exit-overlay').classList.remove('active');
                            }, 3000);
                        }
                    }
                    break;

                case 'left':
                    if (!isMenuOpen) toggleMenu(true);
                    // Cancelar aviso de salir si navegamos
                    if(isWaitingForExitConfirm) { isWaitingForExitConfirm = false; document.getElementById('exit-overlay').classList.remove('active'); clearTimeout(exitTimeout); }
                    break;
                case 'right':
                    if (isMenuOpen) toggleMenu(false);
                    // Cancelar aviso de salir si navegamos
                    if(isWaitingForExitConfirm) { isWaitingForExitConfirm = false; document.getElementById('exit-overlay').classList.remove('active'); clearTimeout(exitTimeout); }
                    break;
                case 'ok':
                    if (isMenuOpen) selectEvent(currentIndex);
                    break;
                case 'up': 
                    if(isMenuOpen) navigate(-1); 
                    // Cancelar aviso
                    if(isWaitingForExitConfirm) { isWaitingForExitConfirm = false; document.getElementById('exit-overlay').classList.remove('active'); clearTimeout(exitTimeout); }
                    break;
                case 'down': 
                    if(isMenuOpen) navigate(1); 
                    // Cancelar aviso
                    if(isWaitingForExitConfirm) { isWaitingForExitConfirm = false; document.getElementById('exit-overlay').classList.remove('active'); clearTimeout(exitTimeout); }
                    break;
            }
        }

        function toggleMenu(open) {
            isMenuOpen = open;
            document.getElementById('sidebar').classList.toggle('open', open);
            if (open) updateSelection();
        }

        function navigate(dir) {
            currentIndex += dir;
            if (currentIndex < 0) currentIndex = 0;
            if (currentIndex >= currentList.length) currentIndex = currentList.length - 1;
            updateSelection();
            document.querySelector('.event-item.selected')?.scrollIntoView({block: 'nearest'});
        }

        function updateSelection() {
            document.querySelectorAll('.event-item').forEach((el, i) => el.classList.toggle('selected', i === currentIndex));
        }

        function selectEvent(idx) {
            const event = currentList[idx];
            if (!event || event.channels.length === 0) return;
            if (event.channels.length > 1) showChannelModal(event.channels);
            else playChannel(event.channels[0]);
        }

        // --- REPRODUCTOR ---
        function playChannel(channel) {
            const iframe = document.getElementById('tv-screen');
            let finalUrl = channel.url;
            if (!finalUrl.includes('autoplay')) finalUrl += (finalUrl.includes('?') ? '&' : '?') + 'autoplay=1';
            // Defer actually navigating the iframe until the user explicitly presses OK.
            // That user gesture will allow audio to play in most browsers.
            iframe.dataset.pendingSrc = finalUrl;
            iframe.style.display = 'block';
            document.getElementById('channel-name').innerText = channel.name;

            toggleMenu(false);
            closeModal();
            isWaitingForPlay = true;
            document.getElementById('play-overlay').classList.add('active');
        }
        
        function triggerPlay() {
            const iframe = document.getElementById('tv-screen');
            // If we deferred the source, navigate now in response to the user action.
            if (iframe.dataset.pendingSrc) {
                iframe.src = iframe.dataset.pendingSrc;
                delete iframe.dataset.pendingSrc;
            } else {
                // Fallback: briefly reload to trigger playback under user gesture.
                const currentSrc = iframe.src;
                iframe.src = 'about:blank';
                setTimeout(() => iframe.src = currentSrc, 100);
            }
            isWaitingForPlay = false;
            document.getElementById('play-overlay').classList.remove('active');
        }

        // --- MODAL ---
        function showChannelModal(channels) {
            isModalOpen = true; currentModalIndex = 0;
            const opts = document.getElementById('channel-options');
            opts.innerHTML = '';
            channels.forEach((ch, i) => {
                const div = document.createElement('div');
                div.className = 'channel-option' + (i === 0 ? ' selected' : '');
                div.innerText = ch.name;
                div.onclick = () => playChannel(ch);
                opts.appendChild(div);
            });
            document.getElementById('channel-modal').style.display = 'block';
        }

        function handleModalNav(action) {
            const opts = document.querySelectorAll('.channel-option');
            if (action === 'up') { currentModalIndex--; if(currentModalIndex<0) currentModalIndex=0; updateModalSel(); }
            if (action === 'down') { currentModalIndex++; if(currentModalIndex>=opts.length) currentModalIndex=opts.length-1; updateModalSel(); }
            if (action === 'ok') playChannel(currentList[currentIndex].channels[currentModalIndex]);
            if (action === 'back' || action === 'left') closeModal();
            if (action === 'home') { closeModal(); powerOff(); }
        }

        function updateModalSel() {
            document.querySelectorAll('.channel-option').forEach((el, i) => el.classList.toggle('selected', i === currentModalIndex));
        }

        function closeModal() {
            isModalOpen = false;
            document.getElementById('channel-modal').style.display = 'none';
        }
        
        function renderAgenda() {
            const container = document.getElementById('event-list');
            container.innerHTML = '';
            if(currentList.length === 0) {
                 container.innerHTML = '<div class="event-item"><div class="event-name">No hay eventos</div></div>';
                 return;
            }
            currentList.forEach((ev, idx) => {
                const div = document.createElement('div');
                div.className = 'event-item' + (idx === currentIndex ? ' selected' : '');
                div.innerHTML = `<div class="event-time">${ev.time}</div><div class="event-name">${ev.teams}</div><div class="event-league">${ev.league}</div>`;
                div.onclick = () => { currentIndex = idx; selectEvent(idx); };
                container.appendChild(div);
            });
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('current-time').innerText = now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
        }

        init();

    </script>
</body>
</html>
