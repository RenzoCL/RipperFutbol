<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SportStream</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --nf-red:  #e50914;
  --bg:      #141414;
  --bg2:     #1c1c1c;
  --surface: #2a2a2a;
  --border:  rgba(255,255,255,0.08);
  --gold:    #f5c842;
  --green:   #46d369;
  --white:   #ffffff;
  --dim:     rgba(255,255,255,0.38);
  --mid:     rgba(255,255,255,0.7);
  --fh:      'Anton', sans-serif;
  --fb:      'DM Sans', sans-serif;
  --sw:      460px;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #000;
  font-family: var(--fb);
  color: var(--white);
  user-select: none;
  -webkit-font-smoothing: antialiased;
}

body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.025) 3px, rgba(0,0,0,0.025) 4px);
  pointer-events: none;
  z-index: 9000;
}

#tv-container {
  display: none;
  width: 100vw; height: 100vh;
  position: relative;
  overflow: hidden;
  background: var(--bg);
}
#off-screen { display: none; }

.player-area { position: absolute; inset: 0; background: #000; z-index: 1; }
.tv-screen   { width: 100%; height: 100%; border: none; background: #000; }

/* ── HEADER ── */
.tv-header {
  position: absolute; top: 0; left: 0; right: 0; z-index: 30;
  padding: 18px 32px;
  display: flex; align-items: center; justify-content: space-between;
  background: linear-gradient(to bottom, rgba(0,0,0,0.88) 0%, transparent 100%);
  pointer-events: none;
}
.header-brand { display: flex; align-items: center; gap: 10px; }
.brand-box {
  background: var(--nf-red);
  font-family: var(--fh);
  font-size: 0.9rem; letter-spacing: 0.08em;
  padding: 4px 9px; border-radius: 3px;
}
.brand-name {
  font-family: var(--fh);
  font-size: 1.45rem; letter-spacing: 0.06em;
}
.header-right { display: flex; align-items: center; gap: 14px; }
.live-pill {
  display: flex; align-items: center; gap: 6px;
  background: rgba(229,9,20,0.12);
  border: 1px solid rgba(229,9,20,0.35);
  padding: 4px 11px; border-radius: 20px;
  font-size: 0.68rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--nf-red);
}
.live-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--nf-red);
  animation: pdot 1.5s ease-in-out infinite;
}
@keyframes pdot { 0%,100%{opacity:1} 50%{opacity:0.2} }
.header-time { font-family: var(--fh); font-size: 1.55rem; letter-spacing: 0.06em; }

/* ── SIDEBAR ── */
.sidebar {
  position: absolute; top: 0; left: calc(-1 * var(--sw));
  width: var(--sw); height: 100%;
  z-index: 40;
  display: flex; flex-direction: column;
  background: var(--bg);
  border-right: 1px solid rgba(229,9,20,0.18);
  transition: left 0.38s cubic-bezier(0.16,1,0.3,1);
}
.sidebar.open { left: 0; }
.sidebar::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--nf-red) 0%, #ff6b35 50%, var(--nf-red) 100%);
  background-size: 200% 100%;
  animation: sb 3s linear infinite;
}
@keyframes sb { 0%{background-position:0%} 100%{background-position:200%} }

.sidebar-top { padding: 26px 22px 0; flex-shrink: 0; }
.sb-brand-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 18px;
}
.sb-logo { display: flex; align-items: center; gap: 11px; }
.sb-logo-icon {
  width: 42px; height: 42px; border-radius: 8px;
  background: var(--nf-red);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem;
  box-shadow: 0 4px 18px rgba(229,9,20,0.45);
  flex-shrink: 0;
}
.sb-logo-text h2 { font-family: var(--fh); font-size: 1.1rem; letter-spacing: 0.08em; margin-bottom: 2px; }
.sb-logo-text p  { font-size: 0.65rem; color: var(--dim); letter-spacing: 0.04em; text-transform: uppercase; }

.status-badge {
  font-size: 0.62rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 5px 10px; border-radius: 4px; cursor: pointer; white-space: nowrap;
  background: rgba(70,211,105,0.1); border: 1px solid rgba(70,211,105,0.28); color: var(--green);
}

.sb-stats { display: flex; gap: 8px; margin-bottom: 18px; }
.stat-pill {
  flex: 1;
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 14px; display: flex; align-items: center; gap: 10px;
}
.stat-num { font-family: var(--fh); font-size: 1.55rem; color: var(--nf-red); line-height: 1; }
.stat-lbl { font-size: 0.6rem; color: var(--dim); text-transform: uppercase; letter-spacing: 0.08em; }

.sb-section {
  font-size: 0.62rem; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--dim); padding: 14px 22px 9px;
  border-top: 1px solid var(--border); flex-shrink: 0;
}

/* ── EVENT LIST ── */
.event-list { flex: 1; overflow-y: auto; scrollbar-width: none; }
.event-list::-webkit-scrollbar { display: none; }

.event-item {
  display: flex; align-items: center;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  cursor: pointer; position: relative; overflow: hidden;
  transition: background 0.12s;
}
.event-item::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--nf-red); transform: scaleY(0); transform-origin: center;
  transition: transform 0.16s ease;
}
.event-item.selected { background: rgba(229,9,20,0.07); }
.event-item.selected::before { transform: scaleY(1); }

.ev-time {
  flex-shrink: 0; width: 68px; text-align: center;
  padding: 16px 0; border-right: 1px solid var(--border);
}
.ev-time-h { font-family: var(--fh); font-size: 1.25rem; color: var(--gold); letter-spacing: 0.04em; }
.ev-time-l { font-size: 0.52rem; color: var(--dim); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 2px; }

.ev-body { flex: 1; padding: 14px 14px; min-width: 0; }
.ev-teams {
  font-size: 0.93rem; font-weight: 500; color: var(--white);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px;
}
.ev-meta { display: flex; align-items: center; gap: 7px; }
.ev-league { font-size: 0.65rem; color: var(--dim); text-transform: uppercase; letter-spacing: 0.04em; }
.ev-chs {
  font-size: 0.58rem; font-weight: 600; padding: 2px 6px; border-radius: 3px; letter-spacing: 0.06em;
  background: rgba(229,9,20,0.12); border: 1px solid rgba(229,9,20,0.28); color: rgba(229,9,20,0.85);
}
.ev-arr {
  flex-shrink: 0; width: 34px; display: flex; align-items: center; justify-content: center;
  color: var(--dim); font-size: 1.1rem; opacity: 0; transition: opacity 0.12s, color 0.12s;
}
.event-item.selected .ev-arr { opacity: 1; color: var(--nf-red); }

.empty-state { text-align: center; padding: 55px 22px; color: var(--dim); }
.empty-icon  { font-size: 2.3rem; opacity: 0.25; margin-bottom: 10px; }
.empty-state h3 { font-family: var(--fh); font-size: 1.1rem; letter-spacing: 0.1em; color: var(--dim); }

/* ── SIDEBAR FOOTER ── */
.sb-footer {
  flex-shrink: 0; padding: 11px 22px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.key-hint  { display: flex; align-items: center; gap: 5px; font-size: 0.63rem; color: var(--dim); letter-spacing: 0.04em; text-transform: uppercase; }
.key { background: var(--surface); border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; padding: 2px 7px; font-size: 0.62rem; color: var(--mid); }

/* ── DIM LAYER ── */
#sidebar-dim {
  position: absolute; inset: 0; background: transparent;
  z-index: 35; pointer-events: none;
  transition: background 0.38s ease;
}
#sidebar-dim.active { background: rgba(0,0,0,0.58); }

/* ── PLAY OVERLAY ── */
.play-overlay {
  position: absolute; inset: 0; z-index: 50;
  display: none; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.68);
  backdrop-filter: blur(4px);
}
.play-overlay.active { display: flex; }
.play-ring-wrap { position: relative; display: flex; align-items: center; justify-content: center; }
.play-ring {
  position: absolute; border-radius: 50%;
  border: 1px solid rgba(229,9,20,0.35);
  animation: rout 2.2s ease-out infinite;
}
.play-ring:nth-child(1){width:130px;height:130px;animation-delay:0s}
.play-ring:nth-child(2){width:170px;height:170px;animation-delay:0.5s}
.play-ring:nth-child(3){width:210px;height:210px;animation-delay:1s}
@keyframes rout { 0%{transform:scale(0.7);opacity:0.8} 100%{transform:scale(1.35);opacity:0} }
.play-btn {
  position: relative; z-index: 2;
  width: 86px; height: 86px; border-radius: 50%;
  background: var(--nf-red);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 40px rgba(229,9,20,0.7), 0 0 80px rgba(229,9,20,0.3);
  animation: bbreath 2s ease-in-out infinite;
}
@keyframes bbreath {
  0%,100%{box-shadow:0 0 40px rgba(229,9,20,0.7),0 0 80px rgba(229,9,20,0.3)}
  50%{box-shadow:0 0 60px rgba(229,9,20,1),0 0 120px rgba(229,9,20,0.5)}
}
.play-btn svg { width: 30px; height: 30px; fill: white; margin-left: 5px; }
.play-txt {
  position: absolute; bottom: -68px; left: 50%; transform: translateX(-50%);
  text-align: center; white-space: nowrap;
}
.play-txt-main { font-family: var(--fh); font-size: 1.7rem; letter-spacing: 0.2em; display: block; }
.play-txt-sub  { font-size: 0.68rem; color: var(--dim); letter-spacing: 0.12em; text-transform: uppercase; }

/* ── EXIT OVERLAY ── */
.exit-overlay {
  position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%);
  background: rgba(18,18,18,0.95);
  border: 1px solid rgba(229,9,20,0.35); border-radius: 8px;
  padding: 11px 26px; z-index: 60;
  display: none; align-items: center; justify-content: center;
  backdrop-filter: blur(10px);
}
.exit-overlay.active { display: flex; }
.exit-box { font-size: 0.86rem; color: var(--mid); letter-spacing: 0.04em; }
.exit-box strong { color: var(--nf-red); }

/* ── CHANNEL MODAL ── */
.channel-modal {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%,-50%) scale(0.91);
  background: #181818;
  border-radius: 12px;
  border: 1px solid rgba(229,9,20,0.28);
  min-width: 375px;
  box-shadow: 0 40px 100px rgba(0,0,0,0.95), 0 0 60px rgba(229,9,20,0.07), 0 0 0 1px rgba(255,255,255,0.03);
  overflow: hidden;
  visibility: hidden; pointer-events: none; opacity: 0;
  z-index: 200;
  transition: opacity 0.2s ease, transform 0.22s cubic-bezier(0.16,1,0.3,1);
}
.channel-modal.show { visibility: visible; pointer-events: all; opacity: 1; transform: translate(-50%,-50%) scale(1); }

.modal-hdr {
  padding: 17px 20px;
  background: rgba(229,9,20,0.09);
  border-bottom: 1px solid rgba(229,9,20,0.14);
  display: flex; align-items: center; gap: 9px;
}
.modal-hdr-icon { font-size: 0.95rem; }
.modal-hdr h3 { flex:1; font-family: var(--fh); font-size: 1.15rem; letter-spacing: 0.1em; }
.modal-ctr { font-family: var(--fh); font-size: 0.82rem; color: var(--nf-red); letter-spacing: 0.06em; }
.modal-body { padding: 8px; position: relative; }

.carousel-viewport { overflow: hidden; position: relative; }
.carousel-viewport::before,
.carousel-viewport::after {
  content: ''; position: absolute; left: 0; right: 0; height: 22px;
  pointer-events: none; z-index: 2;
}
.carousel-viewport::before { top: 0;    background: linear-gradient(to bottom, #181818, transparent); }
.carousel-viewport::after  { bottom: 0; background: linear-gradient(to top,   #181818, transparent); }

.carousel-track {
  display: flex; flex-direction: column;
  transition: transform 0.27s cubic-bezier(0.16,1,0.3,1);
  will-change: transform;
}
.channel-option {
  height: 52px; margin: 3px 0; padding: 0 15px;
  background: rgba(255,255,255,0.04);
  border-radius: 6px; border: 1px solid transparent;
  display: flex; align-items: center; gap: 11px;
  font-size: 0.93rem; cursor: pointer; flex-shrink: 0;
  transition: background 0.11s, border-color 0.11s;
}
.channel-option .ch-i { font-size: 0.52rem; color: var(--dim); flex-shrink:0; transition: color 0.11s; }
.channel-option .ch-n { flex:1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.channel-option .ch-x { font-family: var(--fh); font-size: 0.78rem; color: var(--dim); flex-shrink:0; transition: color 0.11s; }
.channel-option.selected { background: rgba(229,9,20,0.14); border-color: rgba(229,9,20,0.45); color: var(--white); }
.channel-option.selected .ch-i,
.channel-option.selected .ch-x { color: var(--nf-red); }

.modal-arrow { text-align: center; padding: 2px 0; height: 18px; color: rgba(229,9,20,0.45); font-size: 0.58rem; letter-spacing: 0.2em; }
.modal-arrow.hidden { visibility: hidden; }

/* ── BLOCK WIPE ── */
#block-wipe {
  position: fixed; inset: 0; z-index: 8000;
  pointer-events: none;
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  grid-template-rows: repeat(5, 1fr);
}
.wipe-block { background: var(--bg); transform: scaleY(0); transform-origin: bottom; will-change: transform; }

/* ── SIDEBAR WIPE ── */
#sidebar-wipe {
  position: absolute; top: 0; left: 0;
  width: var(--sw); height: 100%;
  z-index: 39; pointer-events: none;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(6, 1fr);
}
.swipe-block { background: var(--bg2); transform: scaleX(0); transform-origin: left; will-change: transform; }
</style>
</head>
<body>

<div id="block-wipe"></div>
<div id="sidebar-wipe"></div>
<div id="off-screen"></div>

<div id="tv-container">

  <div class="player-area">
    <iframe id="tv-screen" class="tv-screen" style="display:none;"
      allow="autoplay; encrypted-media; fullscreen; picture-in-picture" allowfullscreen></iframe>

    <div class="play-overlay" id="play-overlay">
      <div class="play-ring-wrap">
        <div class="play-ring"></div>
        <div class="play-ring"></div>
        <div class="play-ring"></div>
        <div class="play-btn">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
        <div class="play-txt">
          <span class="play-txt-main">PRESIONE OK</span>
          <span class="play-txt-sub">para iniciar reproducción</span>
        </div>
      </div>
    </div>
  </div>

  <div id="sidebar-dim"></div>

  <div class="exit-overlay" id="exit-overlay">
    <div class="exit-box">Presione <strong>BACK</strong> nuevamente para salir</div>
  </div>

  <div class="tv-header">
    <div class="header-brand">
      <span class="brand-box">SPORT</span>
      <span class="brand-name" id="channel-name">STREAM</span>
    </div>
    <div class="header-right">
      <div class="live-pill"><div class="live-dot"></div>EN VIVO</div>
      <div class="header-time" id="current-time">00:00</div>
    </div>
  </div>

  <div class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <div class="sb-brand-row">
        <div class="sb-logo">
          <div class="sb-logo-icon">⚽</div>
          <div class="sb-logo-text">
            <h2>AGENDA DEPORTIVA</h2>
            <p>por Renzo Chavarria</p>
          </div>
        </div>
        <span class="status-badge" id="status-badge" onclick="tryUpdate()">LOCAL</span>
      </div>
      <div class="sb-stats" id="sidebar-stats" style="display:none;">
        <div class="stat-pill">
          <div class="stat-num" id="stat-total">0</div>
          <div class="stat-lbl">Eventos</div>
        </div>
        <div class="stat-pill">
          <div class="stat-num" id="stat-channels">0</div>
          <div class="stat-lbl">Canales</div>
        </div>
      </div>
    </div>

    <div class="sb-section">Partidos de Hoy</div>
    <div class="event-list" id="event-list"></div>

    <div class="sb-footer">
      <div class="key-hint"><span class="key">↑↓</span>Navegar</div>
      <div class="key-hint"><span class="key">OK</span>Ver</div>
      <div class="key-hint"><span class="key">◀▶</span>Menú</div>
    </div>
  </div>

  <div class="channel-modal" id="channel-modal">
    <div class="modal-hdr">
      <span class="modal-hdr-icon">📡</span>
      <h3>ELIGE CANAL</h3>
      <span class="modal-ctr" id="modal-counter"></span>
    </div>
    <div class="modal-body">
      <div class="modal-arrow hidden" id="modal-arrow-up">▲ ▲ ▲</div>
      <div class="carousel-viewport">
        <div class="carousel-track" id="channel-options"></div>
      </div>
      <div class="modal-arrow hidden" id="modal-arrow-down">▼ ▼ ▼</div>
    </div>
  </div>

</div>

<script>
/* BUILD BLOCKS */
(function(){
  const bw = document.getElementById('block-wipe');
  for(let i=0;i<40;i++){const d=document.createElement('div');d.className='wipe-block';bw.appendChild(d);}
  const sw = document.getElementById('sidebar-wipe');
  for(let i=0;i<24;i++){const d=document.createElement('div');d.className='swipe-block';sw.appendChild(d);}
})();

/* ── TRANSITION ENGINE ── */
function blockWipe(callback) {
  const blocks = document.querySelectorAll('.wipe-block');
  // Reset
  blocks.forEach(b => { b.style.transition='none'; b.style.transformOrigin='bottom'; b.style.transform='scaleY(0)'; });
  requestAnimationFrame(() => {
    // Drop in — staggered by column
    blocks.forEach((b,i) => {
      const col = i % 8;
      b.style.transition = `transform 180ms ${col*28}ms cubic-bezier(0.55,0,0.45,1)`;
      b.style.transform = 'scaleY(1)';
    });
    // At peak: run callback, then retract upward
    setTimeout(() => {
      callback();
      setTimeout(() => {
        blocks.forEach((b,i) => {
          const col = i % 8;
          b.style.transformOrigin = 'top';
          b.style.transition = `transform 200ms ${col*22}ms cubic-bezier(0.55,0,0.45,1)`;
          b.style.transform = 'scaleY(0)';
        });
      }, 100);
    }, 300);
  });
}

function sidebarWipe(callback) {
  const blocks = document.querySelectorAll('.swipe-block');
  blocks.forEach(b => { b.style.transition='none'; b.style.transformOrigin='left'; b.style.transform='scaleX(0)'; });
  requestAnimationFrame(() => {
    blocks.forEach((b,i) => {
      const row = Math.floor(i/4);
      b.style.transition = `transform 150ms ${row*18}ms cubic-bezier(0.55,0,0.45,1)`;
      b.style.transform = 'scaleX(1)';
    });
    setTimeout(() => {
      callback();
      setTimeout(() => {
        blocks.forEach((b,i) => {
          const row = Math.floor(i/4);
          b.style.transformOrigin = 'right';
          b.style.transition = `transform 170ms ${row*14}ms cubic-bezier(0.55,0,0.45,1)`;
          b.style.transform = 'scaleX(0)';
        });
      }, 70);
    }, 240);
  });
}

/* ── APP STATE ── */
let isAppRunning = false;
let isMenuOpen = false;
let currentList = [];
let currentIndex = 0;
let isModalOpen = false;
let currentModalIndex = 0;
let isWaitingForPlay = false;
let isWaitingForExitConfirm = false;
let exitTimeout = null;

const BACKUP_EVENTS = [
  { time:"12:00", teams:"Partido Prueba 1", league:"Respaldo", channels:[{name:"Canal HD", url:"https://la14hd.com/vivo/canales.php?stream=espn"}] },
  { time:"14:00", teams:"Partido Prueba 2", league:"Respaldo", channels:[{name:"Opcion 1", url:"https://la14hd.com/vivo/canales.php?stream=espn2"}] }
];

/* ── INIT ── */
function init() {
  updateClock();
  setInterval(updateClock, 1000);
  currentList = BACKUP_EVENTS;
  renderAgenda();
  isAppRunning = true;
  document.getElementById('tv-container').style.display = 'block';
  toggleMenu(true);
  setupKeyListener();
  tryUpdate();
}

function setupKeyListener() {
  document.addEventListener('keydown', function(e) {
    if (!isAppRunning) return;
    if(['Backspace','Escape','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
    switch(e.key) {
      case 'ArrowUp':    handleRemote('up');    break;
      case 'ArrowDown':  handleRemote('down');  break;
      case 'ArrowLeft':  handleRemote('left');  break;
      case 'ArrowRight': handleRemote('right'); break;
      case 'Enter':      handleRemote('ok');    break;
      case 'Escape':     handleRemote('back');  break;
      case 'Backspace':  handleRemote('home');  break;
    }
  });
}

/* ── REMOTE ── */
function handleRemote(action) {
  if (isWaitingForPlay) {
    if (action==='ok') triggerPlay();
    else if (action==='back'||action==='home') {
      isWaitingForPlay = false;
      document.getElementById('play-overlay').classList.remove('active');
      document.getElementById('tv-screen').src = 'about:blank';
      toggleMenu(true);
    }
    return;
  }
  if (isModalOpen) { handleModalNav(action); return; }
  if ((action==='up'||action==='down') && isWaitingForExitConfirm) {
    isWaitingForExitConfirm = false;
    document.getElementById('exit-overlay').classList.remove('active');
    clearTimeout(exitTimeout);
  }
  switch(action) {
    case 'home': powerOff(); break;
    case 'back':
      if (isMenuOpen) toggleMenu(false);
      else {
        if (isWaitingForExitConfirm) powerOff();
        else {
          isWaitingForExitConfirm = true;
          document.getElementById('exit-overlay').classList.add('active');
          clearTimeout(exitTimeout);
          exitTimeout = setTimeout(()=>{ isWaitingForExitConfirm=false; document.getElementById('exit-overlay').classList.remove('active'); },3000);
        }
      }
      break;
    case 'left':  if (!isMenuOpen) toggleMenu(true);  break;
    case 'right': if (isMenuOpen)  toggleMenu(false); break;
    case 'ok':    if (isMenuOpen)  selectEvent(currentIndex); break;
    case 'up':    if (isMenuOpen)  navigate(-1); break;
    case 'down':  if (isMenuOpen)  navigate(1);  break;
  }
}

/* ── MENU ── */
function setSidebarDim(active) {
  const d = document.getElementById('sidebar-dim');
  if (d) d.classList.toggle('active', active);
}

function toggleMenu(open) {
  isMenuOpen = open;
  sidebarWipe(() => {
    document.getElementById('sidebar').classList.toggle('open', open);
    setSidebarDim(open);
    if (open) updateSelection();
  });
}

/* ── CAROUSEL ── */
const VISIBLE_ITEMS = 6;
const ITEM_HEIGHT   = 58;
let carouselChannels = [];
let carouselOffset   = 0;

function showChannelModal(channels) {
  isModalOpen = true;
  currentModalIndex = 0;
  carouselChannels = channels;
  carouselOffset = 0;
  renderCarousel();
  document.getElementById('channel-modal').classList.add('show');
}

function renderCarousel() {
  const track = document.getElementById('channel-options');
  track.innerHTML = '';
  carouselChannels.forEach((ch,i) => {
    const div = document.createElement('div');
    div.className = 'channel-option' + (i===currentModalIndex?' selected':'');
    div.innerHTML = `<span class="ch-i">▶</span><span class="ch-n">${ch.name}</span><span class="ch-x">${String(i+1).padStart(2,'0')}</span>`;
    div.onclick = () => { currentModalIndex=i; playChannel(ch); };
    track.appendChild(div);
  });
  const vp = track.closest('.carousel-viewport');
  if (vp) vp.style.height = (Math.min(carouselChannels.length, VISIBLE_ITEMS) * ITEM_HEIGHT) + 'px';
  updateCarouselScroll();
  updateCarouselArrows();
}

function updateCarouselScroll() {
  if (currentModalIndex < carouselOffset) carouselOffset = currentModalIndex;
  else if (currentModalIndex >= carouselOffset+VISIBLE_ITEMS) carouselOffset = currentModalIndex-VISIBLE_ITEMS+1;
  const t = document.getElementById('channel-options');
  if (t) t.style.transform = `translateY(-${carouselOffset*ITEM_HEIGHT}px)`;
}

function updateCarouselArrows() {
  const up  = document.getElementById('modal-arrow-up');
  const dn  = document.getElementById('modal-arrow-down');
  const ctr = document.getElementById('modal-counter');
  if (up)  up.classList.toggle('hidden', carouselOffset<=0);
  if (dn)  dn.classList.toggle('hidden', carouselOffset+VISIBLE_ITEMS>=carouselChannels.length);
  if (ctr) ctr.textContent = `${currentModalIndex+1} / ${carouselChannels.length}`;
}

function handleModalNav(action) {
  const total = carouselChannels.length;
  if (action==='up')   { currentModalIndex=Math.max(0,currentModalIndex-1); updateCarouselScroll(); updateCarouselArrows(); updateModalSel(); }
  if (action==='down') { currentModalIndex=Math.min(total-1,currentModalIndex+1); updateCarouselScroll(); updateCarouselArrows(); updateModalSel(); }
  if (action==='ok')   playChannel(carouselChannels[currentModalIndex]);
  if (action==='back'||action==='left') closeModal();
  if (action==='home') { closeModal(); powerOff(); }
}

function updateModalSel() {
  document.querySelectorAll('.channel-option').forEach((el,i) => el.classList.toggle('selected', i===currentModalIndex));
}

function closeModal() {
  isModalOpen = false;
  const m = document.getElementById('channel-modal');
  if (m) m.classList.remove('show');
}

/* ── NAVIGATION ── */
function navigate(dir) {
  if (!currentList.length) return;
  currentIndex = Math.max(0, Math.min(currentList.length-1, currentIndex+dir));
  updateSelection();
  document.querySelector('.event-item.selected')?.scrollIntoView({block:'nearest'});
}

function updateSelection() {
  document.querySelectorAll('.event-item').forEach((el,i) => el.classList.toggle('selected', i===currentIndex));
}

function selectEvent(idx) {
  const event = currentList[idx];
  if (!event||!event.channels.length) return;
  if (event.channels.length>1) showChannelModal(event.channels);
  else playChannel(event.channels[0]);
}

/* ── PLAYER ── */
function playChannel(channel) {
  const url = channel.url;
  closeModal();
  if (typeof Android !== 'undefined') {
    blockWipe(() => { Android.playVideo(url); });
  } else {
    blockWipe(() => {
      const iframe = document.getElementById('tv-screen');
      let finalUrl = url;
      if (!finalUrl.includes('autoplay')) finalUrl += (finalUrl.includes('?')?'&':'?')+'autoplay=1';
      iframe.src = finalUrl;
      iframe.style.display = 'block';
      document.getElementById('channel-name').innerText = channel.name;
      toggleMenu(false);
      isWaitingForPlay = true;
      document.getElementById('play-overlay').classList.add('active');
    });
  }
}

function triggerPlay() {
  isWaitingForPlay = false;
  document.getElementById('play-overlay').classList.remove('active');
  if (typeof Android !== 'undefined') Android.onPlayTriggered();
  const iframe = document.getElementById('tv-screen');
  try {
    const d = iframe.contentDocument || iframe.contentWindow.document;
    d.body.click();
    const v = d.querySelector('video');
    if (v) v.play();
  } catch(e) {}
}

/* ── DATA ── */
async function tryUpdate() {
  const badge = document.getElementById('status-badge');
  badge.innerText = 'CARGANDO...';
  const URL = 'https://gist.githubusercontent.com/RenzoCL/7f56fdb7784efa4aa8e135f0968a0dc1/raw/eventos.json';
  try {
    const res = await fetch(URL+'?t='+Date.now());
    if (!res.ok) throw new Error();
    const data = await res.json();
    if (data&&data.length>0) {
      currentList = data.sort((a,b)=>a.time.localeCompare(b.time));
      renderAgenda();
      badge.innerText='EN VIVO';
      badge.style.cssText='background:rgba(70,211,105,0.1);border-color:rgba(70,211,105,0.3);color:#46d369';
    } else {
      showEmptyState('No hay eventos'); badge.innerText='SIN EVENTOS';
    }
  } catch(e) {
    badge.innerText='SIN RED';
    badge.style.cssText='background:rgba(229,9,20,0.1);border-color:rgba(229,9,20,0.3);color:#e50914';
    if (!currentList.length) showEmptyState('Sin conexión');
  }
}

function renderAgenda() {
  const c = document.getElementById('event-list');
  c.innerHTML='';
  if (!currentList.length) { showEmptyState('No hay eventos'); return; }
  const totalCh = currentList.reduce((a,ev)=>a+(ev.channels?ev.channels.length:0),0);
  document.getElementById('stat-total').textContent = currentList.length;
  document.getElementById('stat-channels').textContent = totalCh;
  document.getElementById('sidebar-stats').style.display = 'flex';
  currentList.forEach((ev,idx) => {
    const div = document.createElement('div');
    div.className = 'event-item'+(idx===currentIndex?' selected':'');
    const chCount = ev.channels?ev.channels.length:0;
    div.innerHTML = `
      <div class="ev-time"><div class="ev-time-h">${ev.time}</div><div class="ev-time-l">HORA</div></div>
      <div class="ev-body">
        <div class="ev-teams">${ev.teams}</div>
        <div class="ev-meta">
          <span class="ev-league">${ev.league}</span>
          ${chCount>1?`<span class="ev-chs">${chCount} CH</span>`:''}
        </div>
      </div>
      <div class="ev-arr">›</div>`;
    div.onclick = () => { currentIndex=idx; selectEvent(idx); };
    c.appendChild(div);
  });
}

function showEmptyState(msg) {
  document.getElementById('event-list').innerHTML =
    `<div class="empty-state"><div class="empty-icon">📡</div><h3>${msg}</h3></div>`;
}

function updateClock() {
  document.getElementById('current-time').innerText =
    new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
}

function powerOff() {
  isAppRunning = false;
  document.getElementById('tv-container').style.display='none';
  document.getElementById('off-screen').style.display='flex';
}

/* ── KOTLIN OVERLAY ── */
function forceShowMenu() {
  document.body.style.backgroundColor = 'transparent';
  document.getElementById('tv-container').style.background = 'transparent';
  const s = document.getElementById('sidebar');
  s.classList.add('open'); s.style.width='100%'; s.style.left='0px';
  isMenuOpen=true; updateSelection(); setSidebarDim(true);
  document.getElementById('play-overlay').style.display='none';
  document.getElementById('exit-overlay').style.display='none';
}

function forceHideMenu() {
  document.getElementById('sidebar').classList.remove('open');
  isMenuOpen=false; setSidebarDim(false);
}

init();
init();
</script>
